name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  redact-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run redactor tests
        run: python -m pytest tests/test_redact.py -v
